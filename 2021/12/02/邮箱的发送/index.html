line">61</span><br><span class="line">62</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> time</span><br><span class="line"><span class="keyword">import</span> smtplib</span><br><span class="line"><span class="keyword">from</span> email.mime.text <span class="keyword">import</span> MIMEText</span><br><span class="line"><span class="keyword">from</span> email.mime.multipart <span class="keyword">import</span> MIMEMultipart</span><br><span class="line"><span class="keyword">from</span> email.mime.application <span class="keyword">import</span> MIMEApplication</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Send_Mailbox</span><span class="params">(object)</span>:</span></span><br><span class="line">    <span class="string">'''</span></span><br><span class="line"><span class="string">    host_server:主机地址-&gt; 默认是QQ邮箱的主机地址</span></span><br><span class="line"><span class="string">    sender:发件人邮箱号</span></span><br><span class="line"><span class="string">    code:授权码</span></span><br><span class="line"><span class="string">    target:收件人邮箱号</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">    title：邮件标题</span></span><br><span class="line"><span class="string">    content：邮件正文内容</span></span><br><span class="line"><span class="string">    filepath：邮件需要添加的附件地址</span></span><br><span class="line"><span class="string">    filename：邮件发送时的问价名</span></span><br><span class="line"><span class="string">    '''</span></span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span><span class="params">(self, sender, code, target, host_server=<span class="string">'smtp.qq.com'</span>)</span>:</span></span><br><span class="line">        self.host_server = host_server</span><br><span class="line">        self.sender = sender</span><br><span class="line">        self.code = code</span><br><span class="line">        self.target = target</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">send_out</span><span class="params">(self)</span>:</span></span><br><span class="line">        <span class="comment"># 创建SMTP</span></span><br><span class="line">        smtp = smtplib.SMTP(self.host_server)</span><br><span class="line">        <span class="keyword">try</span>:</span><br><span class="line">            <span class="comment"># 登录操作</span></span><br><span class="line">            smtp.login(self.sender, self.code)</span><br><span class="line">            <span class="comment"># 发送</span></span><br><span class="line">            smtp.sendmail(self.sender, self.target, self.msg.as_string())</span><br><span class="line">            print(<span class="string">"发送成功"</span>)</span><br><span class="line">        <span class="keyword">except</span>:</span><br><span class="line">            print(<span class="string">"发送失败,请检查校验码是否正确或者失效,邮箱地址是否正确"</span>)</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">Set_mail_data</span><span class="params">(self, title, content, filepath=None, filename=None)</span>:</span></span><br><span class="line">        <span class="keyword">if</span> filepath:</span><br><span class="line">            <span class="keyword">try</span>:</span><br><span class="line">                <span class="keyword">with</span> open(filepath, <span class="string">'rb'</span>) <span class="keyword">as</span> f:</span><br><span class="line">                    <span class="keyword">if</span> <span class="keyword">not</span> filename:</span><br><span class="line">                        filename = filepath.split(<span class="string">'/'</span>)[<span class="number">-1</span>]</span><br><span class="line">                    <span class="comment"># 创建附件实例</span></span><br><span class="line">                    attachment = MIMEApplication(f.read())</span><br><span class="line">                    attachment.add_header(<span class="string">'Content-Disposition'</span>, <span class="string">'attachment'</span>, filename=filename)</span><br><span class="line">                    msg = MIMEMultipart()  <span class="comment"># 带附件的实例</span></span><br><span class="line">                    msg[<span class="string">'Subject'</span>] = title  <span class="comment"># 设置邮箱标题</span></span><br><span class="line">                    msg[<span class="string">'From'</span>] = self.sender  <span class="comment"># 设置发件人邮箱</span></span><br><span class="line">                    msg[<span class="string">'To'</span>] = self.target  <span class="comment"># 设置邮件接收方</span></span><br><span class="line">                    msg.attach(MIMEText(content))  <span class="comment"># 设置邮件内容</span></span><br><span class="line">                    msg.attach(attachment)  <span class="comment"># 添加附件</span></span><br><span class="line">                    self.msg = msg</span><br><span class="line">            <span class="keyword">except</span> FileNotFoundError:</span><br><span class="line">                print(<span class="string">'文件路径错误'</span>)</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            msg = MIMEText(content)  <span class="comment"># 不带附件的实例</span></span><br><span class="line">            msg[<span class="string">'Subject'</span>] = title  <span class="comment"># 设置邮箱标题</span></span><br><span class="line">            msg[<span class="string">'From'</span>] = self.sender  <span class="comment"># 设置发件人邮箱</span></span><br><span class="line">            msg[<span class="string">'To'</span>] = self.target  <span class="comment"># 设置邮件接收方</span></span><br><span class="line">            self.msg = msg</span><br></pre></td></tr></table></figure>
